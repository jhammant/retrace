name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Create venv (Python 3.13)
        run: uv venv --python 3.13

      - name: Install (editable + dev)
        run: uv pip install -e ".[dev]"

      - name: Run tests
        run: uv run pytest -q
        # The suite is hermetic: it uses a throwaway RETRACE_HOME and stubs the
        # native Swift/Foundation-Models helpers, so it needs no Xcode toolchain.
